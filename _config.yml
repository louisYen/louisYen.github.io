    category_name        :
    category_id          :
    discussion_term      :
    reactions_enabled    :
    theme                :
    strict               :
    input_position       :
    emit_metadata        :
    lang                 :
    lazy                 :
  staticman:
    branch               :
    endpoint             :

reCaptcha:
  siteKey                :
  secret                 :

# Feed

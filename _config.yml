# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site.
# If you change this file, restart the Jekyll server.

# Theme Settings
# theme                  : "minimal-mistakes-jekyll"
# remote_theme           : "mmistakes/minimal-mistakes"
minimal_mistakes_skin    : "default"

# Site Settings
locale                   : "en-US"
rtl                      :
title                    : "Efficient AI for vision and language models"
title_separator          : "-"
subtitle                 :
name                     : "He-Yen (Louis) Hsieh"
description              : "Ph.D. researcher in Computer Science at Harvard University"
url                      :
baseurl                  :
repository               :
teaser                   :
logo                     :
masthead_title           :
breadcrumbs              :
words_per_minute         : 200
enable_copy_code_button  :
copyright                : 
copyright_url            :

# Comments
